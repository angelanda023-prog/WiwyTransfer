name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  android:
    name: Android (APK)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Build debug APK
        working-directory: android
        run: ./gradlew :app:assembleDebug --console=plain
      - uses: actions/upload-artifact@v4
        with:
          name: wiwytransfer-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

  macos:
    name: macOS (app)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Build app bundle
        working-directory: macos
        run: ./build-app.sh release
      - name: Zip app
        working-directory: macos
        run: ditto -c -k --keepParent WiwyTransfer.app WiwyTransfer-macos.zip
      - uses: actions/upload-artifact@v4
        with:
          name: wiwytransfer-macos
          path: macos/WiwyTransfer-macos.zip
