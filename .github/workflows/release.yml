name: Release

# Compila WiwyTransfer (Android + macOS) y publica los binarios en GitHub Releases.
# Se dispara al empujar una etiqueta de versión (p. ej. v1.0.0) o manualmente.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  android:
    name: Android (APK)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Build APK (debug, instalable)
        working-directory: android
        run: ./gradlew :app:assembleDebug --console=plain
      - name: Renombrar APK
        run: mv android/app/build/outputs/apk/debug/app-debug.apk WiwyTransfer-android.apk
      - uses: actions/upload-artifact@v4
        with:
          name: android
          path: WiwyTransfer-android.apk

  macos:
    name: macOS (.dmg)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Build app bundle
        working-directory: macos
        run: ./build-app.sh release
      - name: Empaquetar .dmg
        working-directory: macos
        run: hdiutil create -volname "WiwyTransfer" -srcfolder WiwyTransfer.app -ov -format UDZO ../WiwyTransfer-macos.dmg
      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: WiwyTransfer-macos.dmg

  release:
    name: Publicar en Releases
    needs: [android, macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Publicar binarios
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
          fail_on_unmatched_files: true
